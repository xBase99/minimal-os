<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voca 1500 학습 App</title>
    <style>
      :root {
        --primary-color: #4a90e2;
        --secondary-color: #f5a623;
        --success-color: #2ec4b6;
        --danger-color: #e71d36;
        --background-color: #f4f7f6;
        --card-color: #ffffff;
        --text-color: #333333;
      }

      body {
        font-family: 'Malgun Gothic', sans-serif;
        background-color: var(--background-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 600px;
        width: 100%;
        text-align: center;
      }

      h1 {
        color: var(--primary-color);
        margin-bottom: 20px;
      }

      .nav-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: bold;
      }

      .btn-mode {
        background-color: #e0e0e0;
        color: #555;
      }

      .btn-mode.active {
        background-color: var(--primary-color);
        color: white;
      }

      .card-view,
      .quiz-view {
        background-color: var(--card-color);
        border-radius: 15px;
        padding: 40px 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        min-height: 250px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        position: relative;
      }

      .word-text {
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #111;
      }

      .word-mean {
        font-size: 22px;
        color: #666;
        margin-top: 10px;
        min-height: 30px;
      }

      .btn-audio {
        background-color: transparent;
        font-size: 24px;
        color: var(--primary-color);
        padding: 5px;
        margin-bottom: 10px;
      }

      .action-buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }

      .btn-action {
        background-color: var(--primary-color);
        color: white;
        width: 120px;
      }

      .quiz-options {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        width: 100%;
        max-width: 400px;
        margin-top: 20px;
      }

      .option-btn {
        background-color: #f0f4f8;
        color: var(--text-color);
        text-align: left;
        padding: 15px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 16px;
      }

      .option-btn:hover {
        background-color: #e2e8f0;
      }

      .option-btn.correct {
        background-color: var(--success-color);
        color: white;
        border-color: var(--success-color);
      }

      .option-btn.wrong {
        background-color: var(--danger-color);
        color: white;
        border-color: var(--danger-color);
      }

      .score-board {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
        color: var(--primary-color);
      }

      .hidden {
        display: none !important;
      }

      .progress {
        font-size: 14px;
        color: #888;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📚 Voca 1500 학습기</h1>

      <div class="nav-buttons">
        <button
          id="btn-memorize-mode"
          class="btn-mode active"
          onclick="switchMode('memorize')"
        >
          암기 모드
        </button>
        <button
          id="btn-quiz-mode"
          class="btn-mode"
          onclick="switchMode('quiz')"
        >
          퀴즈 모드
        </button>
      </div>

      <div id="memorize-view" class="card-view">
        <button class="btn-audio" onclick="playAudio()">🔊</button>
        <div id="memo-word" class="word-text">Loading...</div>
        <div
          id="memo-mean"
          class="word-mean"
          onclick="toggleMeaning()"
          style="cursor: pointer; color: #aaa"
        >
          [클릭하여 뜻 보기]
        </div>
        <div id="memo-progress" class="progress">0 / 0</div>

        <div class="action-buttons">
          <button class="btn-action" onclick="prevWord()">이전</button>
          <button class="btn-action" onclick="nextWord()">다음</button>
        </div>
      </div>

      <div id="quiz-view" class="quiz-view hidden">
        <div id="quiz-score" class="score-board">점수: 0 / 0</div>
        <div id="quiz-word" class="word-text">Word</div>
        <button class="btn-audio" onclick="playQuizAudio()">🔊</button>

        <div class="quiz-options">
          <button class="option-btn" onclick="checkAnswer(0)">1. Option</button>
          <button class="option-btn" onclick="checkAnswer(1)">2. Option</button>
          <button class="option-btn" onclick="checkAnswer(2)">3. Option</button>
          <button class="option-btn" onclick="checkAnswer(3)">4. Option</button>
        </div>

        <div class="action-buttons">
          <button
            id="btn-next-quiz"
            class="btn-action hidden"
            onclick="nextQuiz()"
          >
            다음 문제
          </button>
        </div>
      </div>
    </div>

          { word: "challenge", mean: "도전, 이의를 제기하다" },
          { word: "schedule", mean: "일정, 스케줄" },
          { word: "margin", mean: "여백, 여유, 마진" },
          { word: "paste", mean: "풀, 반죽, 붙이다" },
          { word: "rebel", mean: "반역자, 반란을 일으키다" },
          { word: "rebellion", mean: "반란, 폭동" },
          { word: "scheme", mean: "계획, 책략" },
          { word: "patch", mean: "조각, 패치, 수선하다" },
          { word: "scholarship", mean: "장학금, 학문" },
          { word: "scope", mean: "범위, 시야" },
          { word: "adequate", mean: "적절한, 충분한" },
          { word: "blacksmith", mean: "대장장이" },
          { word: "characteristic", mean: "특징, 특성, 독특한" },
          { word: "chat", mean: "잡담하다, 채팅" },
          { word: "treaty", mean: "조약, 협정" },
          { word: "impose", mean: "부과하다, 강요하다" },
          { word: "imposing", mean: "인상적인, 당당한" },
          { word: "defect", mean: "결함, 결점" },
          { word: "neutral", mean: "중립의, 공평한" },
          { word: "feast", mean: "연회, 잔치" },
          { word: "latitude", mean: "위도, 자유" },
          { word: "cheat", mean: "속이다, 부정행위를 하다" },
          { word: "scorch", mean: "그을리다, 태우다" },
          { word: "patent", mean: "특허, 특허권" },
          { word: "element", mean: "요소, 성분" },
          { word: "elementary", mean: "초보의, 기본적인" },
          { word: "Scotch", mean: "스카치, 스코틀랜드의" },
          { word: "temperance", mean: "절제, 금주" },
          { word: "marine", mean: "해양의, 바다의" },
          { word: "mariner", mean: "선원, 선원인" },
          { word: "pathetic", mean: "애처로운, 한심한" },
          { word: "violate", mean: "위반하다, 침해하다" },
          { word: "unfold", mean: "펼치다, 전개되다" },
          { word: "rebuke", mean: "비난하다, 꾸짖다" }
      ];

      let currentIndex = 0;
      let showMeaning = false;

      let quizCurrentWord = null;
      let quizOptions = [];
      let quizTotal = 0;
      let quizCorrectCount = 0;
      let quizAnswered = false;

      window.onload = function() {
          updateMemorizeCard();
      };

      function switchMode(mode) {
          document.getElementById('btn-memorize-mode').classList.remove('active');
          document.getElementById('btn-quiz-mode').classList.remove('active');
          document.getElementById('memorize-view').classList.add('hidden');
          document.getElementById('quiz-view').classList.add('hidden');

          if(mode === 'memorize') {
              document.getElementById('btn-memorize-mode').classList.add('active');
              document.getElementById('memorize-view').classList.remove('hidden');
              updateMemorizeCard();
          } else if(mode === 'quiz') {
              document.getElementById('btn-quiz-mode').classList.add('active');
              document.getElementById('quiz-view').classList.remove('hidden');
              resetQuiz();
              setupQuizQuestion();
          }
      }

      function updateMemorizeCard() {
          if(vocaData.length === 0) return;
          const current = vocaData[currentIndex];
          document.getElementById('memo-word').innerText = current.word;

          if(showMeaning) {
              document.getElementById('memo-mean').innerText = current.mean;
              document.getElementById('memo-mean').style.color = "var(--text-color)";
          } else {
              document.getElementById('memo-mean').innerText = "[클릭하여 뜻 보기]";
              document.getElementById('memo-mean').style.color = "#aaa";
          }

          document.getElementById('memo-progress').innerText = `${currentIndex + 1} / ${vocaData.length}`;
      }

      function toggleMeaning() {
          showMeaning = !showMeaning;
          updateMemorizeCard();
      }

      function nextWord() {
          showMeaning = false;
          currentIndex = (currentIndex + 1) % vocaData.length;
          updateMemorizeCard();
          playAudio();
      }

      function prevWord() {
          showMeaning = false;
          currentIndex = (currentIndex - 1 + vocaData.length) % vocaData.length;
          updateMemorizeCard();
          playAudio();
      }

      function playAudio() {
          const word = vocaData[currentIndex].word;
          speak(word);
      }

      function resetQuiz() {
          quizTotal = 0;
          quizCorrectCount = 0;
          updateScoreBoard();
      }

      function updateScoreBoard() {
          document.getElementById('quiz-score').innerText = `점수: ${quizCorrectCount} / ${quizTotal}`;
      }

      function setupQuizQuestion() {
          quizAnswered = false;
          document.getElementById('btn-next-quiz').classList.add('hidden');

          const randomIndex = Math.floor(Math.random() * vocaData.length);
          quizCurrentWord = vocaData[randomIndex];

          document.getElementById('quiz-word').innerText = quizCurrentWord.word;

          let options = [quizCurrentWord.mean];
          while(options.length < 4) {
              const randOpt = vocaData[Math.floor(Math.random() * vocaData.length)].mean;
              if(!options.includes(randOpt)) {
                  options.push(randOpt);
              }
          }

          quizOptions = options.sort(() => Math.random() - 0.5);

          const buttons = document.querySelectorAll('.option-btn');
          buttons.forEach((btn, index) => {
              btn.innerText = `${index + 1}. ${quizOptions[index]}`;
              btn.className = "option-btn";
          });

          speak(quizCurrentWord.word);
      }

      function playQuizAudio() {
          if(quizCurrentWord) speak(quizCurrentWord.word);
      }

      function checkAnswer(selectedIndex) {
          if(quizAnswered) return;
          quizAnswered = true;
          quizTotal++;

          const buttons = document.querySelectorAll('.option-btn');
          const correctIndex = quizOptions.indexOf(quizCurrentWord.mean);

          if(selectedIndex === correctIndex) {
              buttons[selectedIndex].classList.add('correct');
              quizCorrectCount++;
          } else {
              buttons[selectedIndex].classList.add('wrong');
              buttons[correctIndex].classList.add('correct');
          }

          updateScoreBoard();
          document.getElementById('btn-next-quiz').classList.remove('hidden');
      }

      function nextQuiz() {
          setupQuizQuestion();
      }

      function speak(text) {
          if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'en-US';
              utterance.rate = 0.85;
              window.speechSynthesis.speak(utterance);
          }
      }
    </script>
  </body>
</html>
