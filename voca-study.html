<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Voca 1500 학습 App (Trip.com 연동)</title>
    <style>
      :root {
        --primary-color: #4a90e2;
        --secondary-color: #f5a623;
        --success-color: #2ec4b6;
        --danger-color: #e71d36;
        --background-color: #f4f7f6;
        --card-color: #ffffff;
        --text-color: #333333;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--background-color);
        color: var(--text-color);
        margin: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        max-width: 500px;
        width: 100%;
        text-align: center;
        margin-bottom: 20px;
      }

      h1 {
        color: var(--primary-color);
        margin-bottom: 15px;
        font-size: 24px;
      }

      .nav-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
        width: 100%;
      }

      button {
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: bold;
      }

      button:active {
        transform: scale(0.98);
        opacity: 0.9;
      }

      .btn-mode {
        background-color: #e0e0e0;
        color: #555;
        flex: 1;
        max-width: 150px;
      }

      .btn-mode.active {
        background-color: var(--primary-color);
        color: white;
      }

      .card-view,
      .quiz-view {
        background-color: var(--card-color);
        border-radius: 20px;
        padding: 30px 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        min-height: 320px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        position: relative;
        width: 100%;
      }

      .word-text {
        font-size: 38px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #111;
        word-break: break-all;
      }

      .word-mean {
        font-size: 20px;
        color: #666;
        margin-top: 10px;
        min-height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
      }

      .btn-audio {
        background-color: transparent;
        font-size: 28px;
        color: var(--primary-color);
        padding: 10px;
        margin-bottom: 10px;
      }

      .action-buttons {
        display: flex;
        gap: 15px;
        margin-top: 25px;
        width: 100%;
        justify-content: center;
      }

      .btn-action {
        background-color: var(--primary-color);
        color: white;
        flex: 1;
        max-width: 140px;
        padding: 14px;
      }

      .quiz-options {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        width: 100%;
        margin-top: 15px;
      }

      .option-btn {
        background-color: #f0f4f8;
        color: var(--text-color);
        text-align: left;
        padding: 14px 18px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        width: 100%;
        line-height: 1.3;
      }

      .option-btn.correct {
        background-color: var(--success-color);
        color: white;
        border-color: var(--success-color);
      }

      .option-btn.wrong {
        background-color: var(--danger-color);
        color: white;
        border-color: var(--danger-color);
      }

      .score-board {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
        color: var(--primary-color);
        background-color: #eef5fc;
        padding: 6px 16px;
        border-radius: 20px;
      }

      .hidden {
        display: none !important;
      }

      .progress {
        font-size: 13px;
        color: #aaa;
        margin-top: 15px;
        letter-spacing: 1px;
      }

      /* ── 트립닷컴 광고 배너 디자인 ── */
      .ad-container {
        width: 100%;
        max-width: 550px;
        margin-top: 10px;
        padding: 10px;
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        overflow: hidden;
      }
      
      .ad-title {
        font-size: 11px;
        color: #bbb;
        text-align: left;
        margin-bottom: 6px;
        font-weight: bold;
        letter-spacing: 0.5px;
        padding-left: 2px;
      }

      .trip-ad-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        background: linear-gradient(135deg, #002d72 0%, #0053a0 100%);
        color: white;
        padding: 14px 16px;
        border-radius: 10px;
        font-weight: bold;
        font-size: 14px;
        text-align: left;
        line-height: 1.4;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        transition: opacity 0.2s ease;
      }

      .trip-ad-link:active {
        opacity: 0.9;
      }

      .trip-ad-link span {
        font-size: 12px;
        background-color: #f5a623;
        color: #fff;
        padding: 6px 10px;
        border-radius: 6px;
        margin-left: 12px;
        white-space: nowrap;
        box-shadow: 0 2px 5px rgba(0,0,0,0.15);
      }

      @media (max-width: 360px) {
        .word-text { font-size: 32px; }
        .word-mean { font-size: 18px; }
        .option-btn { font-size: 14px; padding: 12px; }
        .card-view, .quiz-view { min-height: 280px; }
        .trip-ad-link { font-size: 12px; padding: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📚 Voca 1500 학습기</h1>

      <div class="nav-buttons">
        <button id="btn-memorize-mode" class="btn-mode active" onclick="switchMode('memorize')">암기 모드</button>
        <button id="btn-quiz-mode" class="btn-mode" onclick="switchMode('quiz')">퀴즈 모드</button>
      </div>

      <div id="memorize-view" class="card-view">
        <button class="btn-audio" onclick="playAudio()">🔊</button>
        <div id="memo-word" class="word-text">데이터 로딩 중...</div>
        <div id="memo-mean" class="word-mean" onclick="toggleMeaning()" style="cursor: pointer; color: #aaa">[터치하여 뜻 보기]</div>
        <div id="memo-progress" class="progress">0 / 0</div>

        <div class="action-buttons">
          <button class="btn-action" onclick="prevWord()">이전</button>
          <button class="btn-action" onclick="nextWord()">다음</button>
        </div>
      </div>

      <div id="quiz-view" class="quiz-view hidden">
        <div id="quiz-score" class="score-board">점수: 0 / 0</div>
        <div id="quiz-word" class="word-text">Word</div>
        <button class="btn-audio" onclick="playQuizAudio()">🔊</button>

        <div class="quiz-options">
          <button class="option-btn" onclick="checkAnswer(0)">1. Option</button>
          <button class="option-btn" onclick="checkAnswer(1)">2. Option</button>
          <button class="option-btn" onclick="checkAnswer(2)">3. Option</button>
          <button class="option-btn" onclick="checkAnswer(3)">4. Option</button>
        </div>

        <div class="action-buttons">
          <button id="btn-next-quiz" class="btn-action hidden" onclick="nextQuiz()">다음 문제</button>
        </div>
      </div>

      <!-- ── 하단 트립닷컴 광고 영역 (고유 제휴 링크 반영) ── -->
      <div class="ad-container">
        <div class="ad-title">SPONSORED AD</div>
        <a href="https://www.trip.com/?Allianceid=8796691&SID=320666228&trip_sub1=&trip_sub3=D18170154" target="_blank" class="trip-ad-link">
          ✈️ Trip.com에서 스마트하게! 호텔 & 항공권 최저가 예약하기
          <span>바로가기 &gt;</span>
        </a>
      </div>

    </div>

    <script>
      let vocaData = [];
      let currentIndex = 0;
      let showMeaning = false;
      let quizCurrentWord = null; let quizOptions = []; let quizTotal = 0; let quizCorrectCount = 0; let quizAnswered = false;

      window.onload = function() { fetchWordsData(); };
      async function fetchWordsData() {
          try {
              const response = await fetch('words.json');
              if (!response.ok) throw new Error('파일 로드 실패');
              vocaData = await response.json();
              updateMemorizeCard();
          } catch (error) {
              document.getElementById('memo-word').innerText = "오류";
              document.getElementById('memo-mean').innerText = "words.json 파일을 확인해주세요.";
              document.getElementById('memo-mean').style.color = "var(--danger-color)";
          }
      }
      function switchMode(mode) {
          if (vocaData.length === 0) return;
          document.getElementById('btn-memorize-mode').classList.remove('active');
          document.getElementById('btn-quiz-mode').classList.remove('active');
          document.getElementById('memorize-view').classList.add('hidden');
          document.getElementById('quiz-view').classList.add('hidden');
          if(mode === 'memorize') {
              document.getElementById('btn-memorize-mode').classList.add('active');
              document.getElementById('memorize-view').classList.remove('hidden');
              updateMemorizeCard();
          } else if(mode === 'quiz') {
              document.getElementById('btn-quiz-mode').classList.add('active');
              document.getElementById('quiz-view').classList.remove('hidden');
              resetQuiz(); setupQuizQuestion();
          }
      }
      function updateMemorizeCard() {
          if(vocaData.length === 0) return;
          const current = vocaData[currentIndex];
          document.getElementById('memo-word').innerText = current.word;
          if(showMeaning) {
              document.getElementById('memo-mean').innerText = current.mean;
              document.getElementById('memo-mean').style.color = "var(--text-color)";
          } else {
              document.getElementById('memo-mean').innerText = "[터치하여 뜻 보기]";
              document.getElementById('memo-mean').style.color = "#aaa";
          }
          document.getElementById('memo-progress').innerText = `${currentIndex + 1} / ${vocaData.length}`;
      }
      function toggleMeaning() { if(vocaData.length === 0) return; showMeaning = !showMeaning; updateMemorizeCard(); }
      function nextWord() { if(vocaData.length === 0) return; showMeaning = false; currentIndex = (currentIndex + 1) % vocaData.length; updateMemorizeCard(); playAudio(); }
      function prevWord() { if(vocaData.length === 0) return; showMeaning = false; currentIndex = (currentIndex - 1 + vocaData.length) % vocaData.length; updateMemorizeCard(); playAudio(); }
      function playAudio() { if(vocaData.length === 0) return; speak(vocaData[currentIndex].word); }
      function resetQuiz() { quizTotal = 0; quizCorrectCount = 0; updateScoreBoard(); }
      function updateScoreBoard() { document.getElementById('quiz-score').innerText = `점수: ${quizCorrectCount} / ${quizTotal}`; }
      function setupQuizQuestion() {
          if(vocaData.length === 0) return;
          quizAnswered = false; document.getElementById('btn-next-quiz').classList.add('hidden');
          const randomIndex = Math.floor(Math.random() * vocaData.length);
          quizCurrentWord = vocaData[randomIndex];
          document.getElementById('quiz-word').innerText = quizCurrentWord.word;
          let options = [quizCurrentWord.mean];
          while(options.length < 4) {
              const randOpt = vocaData[Math.floor(Math.random() * vocaData.length)].mean;
              if(!options.includes(randOpt)) options.push(randOpt);
          }
          quizOptions = options.sort(() => Math.random() - 0.5);
          const buttons = document.querySelectorAll('.option-btn');
          buttons.forEach((btn, index) => { btn.innerText = `${index + 1}. ${quizOptions[index]}`; btn.className = "option-btn"; });
          speak(quizCurrentWord.word);
      }
      function playQuizAudio() { if(quizCurrentWord) speak(quizCurrentWord.word); }
      function checkAnswer(selectedIndex) {
          if(quizAnswered) return; quizAnswered = true; quizTotal++;
          const buttons = document.querySelectorAll('.option-btn'); const correctIndex = quizOptions.indexOf(quizCurrentWord.mean);
          if(selectedIndex === correctIndex) { buttons[selectedIndex].classList.add('correct'); quizCorrectCount++; } 
          else { buttons[selectedIndex].classList.add('wrong'); buttons[correctIndex].classList.add('correct'); }
          updateScoreBoard(); document.getElementById('btn-next-quiz').classList.remove('hidden');
      }
      function nextQuiz() { setupQuizQuestion(); }
      function speak(text) {
          if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'en-US'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
          }
      }
    </script>
  </body>
</html>
