<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal OS Workspace</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        /* 데스크톱 바탕화면 그리드 */
        .desktop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 45px; /* 작업 표시줄 공간 제외 */
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            align-content: start;
            justify-items: center;
        }

        /* 앱 아이콘 스타일 */
        .app-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .app-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .app-icon:active {
            transform: translateY(0);
        }

        /* 아이콘 그래픽 생성 (SVG 대용의 깔끔한 미니멀 스타일) */
        .icon-visual {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 앱별 커스텀 색상 테마 */
        .icon-voca {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .icon-sys {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .app-name {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* 하단 작업 표시줄 (Taskbar) */
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45px;
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
            z-index: 1000;
        }

        .taskbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .start-button {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .start-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .system-clock {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>
<body>

    <div class="desktop">
        
        <a href="#" class="app-icon" onclick="alert('시스템 설정 창 열기')">
            <div class="icon-visual icon-sys">⚙️</div>
            <div class="app-name">Settings</div>
        </a>

        <a href="voca-study.html" class="app-icon">
            <div class="icon-visual icon-voca">📝</div>
            <div class="app-name">Voca Study</div>
        </a>

    </div>

    <div class="taskbar">
        <div class="taskbar-left">
            <button class="start-button" onclick="location.reload();">⟳ System</button>
        </div>
        <div class="system-clock" id="live-clock">00:00:00 PM</div>
    </div>

    <script>
        // 작업 표시줄 시계 구동 스크립트
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // 0시를 12시로 표시
            const strHours = String(hours).padStart(2, '0');

            document.getElementById('live-clock').textContent = `${strHours}:${minutes}:${seconds} ${ampm}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock(); // 초기 즉시 실행
    </script>
</body>
</html>
