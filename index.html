<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>PDF Annotator v3.0 (xBase99)</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <!-- PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
      }
    </script>
  </head>

  <body>
    <!-- 상단 헤더 -->
    <header class="top-bar">
      <span class="app-title">PDF Annotator v3.0</span>

      <input
        type="file"
        id="fileInput"
        accept="application/pdf"
        style="display: none"
      />
      <button onclick="document.getElementById('fileInput').click()">
        Choose File
      </button>

      <button onclick="saveToBrowser()">Browser Save</button>
      <button onclick="clearNotes()">Clear Notes</button>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="importJSON()">Import JSON</button>
    </header>

    <!-- 전체 레이아웃 -->
    <div class="layout">
      <!-- 좌측 사이드바 -->
      <aside class="sidebar">
        <section class="panel">
          <h3>PDF LIST</h3>
          <div id="pdfList"></div>
        </section>

        <section class="panel">
          <h3>TOOLS</h3>

          <label>Highlight Color</label>
          <input type="color" id="highlightColor" value="#ffff00" />

          <button class="tool-btn" onclick="setTool('highlight')">
            Highlight
          </button>
          <button class="tool-btn" onclick="setTool('text')">Text</button>
        </section>

        <section class="panel">
          <h3>Trip Ad</h3>
          <div class="trip-ad-box">
            <a href="https://www.trip.com/t/zGQ0YJsVIV2" target="_blank">
              <img src="trip_ad_banner.png" class="trip-banner" />
            </a>
          </div>
        </section>
      </aside>

      <!-- 우측 메인 PDF 영역 -->
      <main class="main-area">
        <canvas id="pdfCanvas"></canvas>
      </main>
    </div>

    <footer class="footer">
      <small>© xBase99 · PDF Annotator v3.0</small>
    </footer>

    <script src="app.js"></script>
    <script src="ads.js"></script>
  </body>
</html>
