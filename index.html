<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 공부 및 추가 앱 (Integrated v1.6)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 기본 스타일 래퍼 (필요에 따라 style.css로 이동 가능) */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .tab-menu {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #777;
        }
        .tab-btn.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
        }
        .app-section {
            display: none;
        }
        .app-section.active {
            display: block;
        }
        /* 단어 추가 폼 스타일 */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        /* 단어 카드 스타일 */
        .word-card {
            text-align: center;
            padding: 4px;
            margin: 20px 0;
            background: #f9f9f9;
            border-radius: 8px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }
        .word-spelling {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }
        .word-meaning {
            font-size: 20px;
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
        .word-meaning.show {
            display: block;
        }
        .nav-btns {
            display: flex;
            justify-content: space-between;
        }
        .nav-btns button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .word-list-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 상단 탭 메뉴 (공부하기 / 단어 추가하기) -->
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('study-section')">단어 공부</button>
            <button class="tab-btn" onclick="switchTab('add-section')">단어 추가</button>
            <button class="tab-btn" onclick="switchTab('list-section')">단어 목록</button>
        </div>

        <!-- 1. 단어 공부 섹션 -->
        <div id="study-section" class="app-section active">
            <div class="word-card" onclick="toggleMeaning()">
                <div id="card-word" class="word-spelling">등록된 단어가 없습니다</div>
                <div id="card-meaning" class="word-meaning">뜻을 추가해 주세요</div>
            </div>
            <div class="nav-btns">
                <button onclick="prevWord()">이전</button>
                <span id="word-progress" style="align-self: center;">0 / 0</span>
                <button onclick="nextWord()">다음</button>
            </div>
        </div>

        <!-- 2. 단어 추가 섹션 -->
        <div id="add-section" class="app-section">
            <h3>새로운 단어 추가</h3>
            <div class="form-group">
                <label for="input-word">단어 (English/Korean)</label>
                <input type="text" id="input-word" placeholder="예: apple 또는 사과">
            </div>
            <div class="form-group">
                <label for="input-meaning">뜻 (Meaning)</label>
                <input type="text" id="input-meaning" placeholder="예: 사과 또는 apple">
            </div>
            <button class="btn-submit" onclick="addNewWord()">단어장에 추가하기</button>
        </div>

        <!-- 3. 등록된 단어 목록 섹션 -->
        <div id="list-section" class="app-section">
            <h3>나의 단어장 목록</h3>
            <div id="word-list-container">
                <!-- 자바스크립트로 동적 생성 -->
            </div>
        </div>
    </div>

    <!-- 기존 앱에 포함된 광고 스크립트나 서비스 워커 연동 유지용 -->
    <script src="ads.js"></script>
    <script>
        // 기본 내장 단어 데이터셋 (word.json 파일이 없거나 비어있을 때 백업 역할)
        const defaultWords = [
            { "word": "initialize", "meaning": "초기화하다" },
            { "word": "reconciliation", "meaning": "화해, (회계)조정·정산" },
            { "word": "application", "meaning": "애플리케이션, 지원(서)" }
        ];

        let words = [];
        let currentIndex = 0;

        // 초기 데이터 로드 (localStorage 확인 -> 없으면 word.json 또는 기본값)
        async function initApp() {
            const localData = localStorage.getItem('custom_voca_words');
            if (localData) {
                words = JSON.parse(localData);
            } else {
                try {
                    // word.json 파일 가운데에서 가져오기 시도
                    const response = await fetch('word.json');
                    if (response.ok) {
                        words = await response.json();
                    } else {
                        words = defaultWords;
                    }
                } catch (e) {
                    words = defaultWords;
                }
                saveToLocalStorage();
            }
            updateCard();
            renderWordList();
        }

        // 로컬스토리지 저장 함수
        function saveToLocalStorage() {
            localStorage.setItem('custom_voca_words', JSON.stringify(words));
        }

        // 탭 전환 기능
        function switchTab(sectionId) {
            document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');

            if(sectionId === 'study-section') {
                updateCard();
            } else if(sectionId === 'list-section') {
                renderWordList();
            }
        }

        // 카드 내용 갱신
        function updateCard() {
            const wordWord = document.getElementById('card-word');
            const wordMeaning = document.getElementById('card-meaning');
            const progress = document.getElementById('word-progress');

            if (words.length === 0) {
                wordWord.innerText = "단어가 없습니다";
                wordMeaning.innerText = "단어를 추가해 주세요";
                progress.innerText = "0 / 0";
                return;
            }

            if (currentIndex >= words.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = words.length - 1;

            wordWord.innerText = words[currentIndex].word;
            wordMeaning.innerText = words[currentIndex].meaning;
            wordMeaning.classList.remove('show'); // 뜻 숨기기 초기화
            progress.innerText = `${currentIndex + 1} / ${words.length}`;
        }

        // 뜻 카드 토글(클릭 시 노출)
        function toggleMeaning() {
            const wordMeaning = document.getElementById('card-meaning');
            wordMeaning.classList.toggle('show');
        }

        function nextWord() {
            if (words.length === 0) return;
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevWord() {
            if (words.length === 0) return;
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        // 새 단어 추가 로직
        function addNewWord() {
            const wordInput = document.getElementById('input-word');
            const meaningInput = document.getElementById('input-meaning');

            const wordVal = wordInput.value.trim();
            const meaningVal = meaningInput.value.trim();

            if (!wordVal || !meaningVal) {
                alert('단어와 뜻을 모두 입력해 주세요!');
                return;
            }

            // 배열에 추가
            words.push({ word: wordVal, meaning: meaningVal });
            saveToLocalStorage();

            // 입력창 초기화
            wordInput.value = '';
            meaningInput.value = '';

            alert('단어가 성공적으로 추가되었습니다!');
            
            // 데이터가 없던 상태에서 추가되었을 수 있으므로 인덱스 고정 후 목록 갱신
            if(words.length === 1) currentIndex = 0;
            renderWordList();
        }

        // 단어 삭제 로직
        function deleteWord(index) {
            if(confirm('이 단어를 삭제하시겠습니까?')) {
                words.splice(index, 1);
                saveToLocalStorage();
                if (currentIndex >= words.length && currentIndex > 0) {
                    currentIndex--;
                }
                renderWordList();
            }
        }

        // 단어 목록 렌더링
        function renderWordList() {
            const container = document.getElementById('word-list-container');
            container.innerHTML = '';

            if(words.length === 0) {
                container.innerHTML = '<p style="color:#999; text-align:center;">등록된 단어가 없습니다.</p>';
                return;
            }

            words.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'word-list-item';
                div.innerHTML = `
                    <span><strong>${item.word}</strong> : ${item.meaning}</span>
                    <button class="btn-delete" onclick="deleteWord(${index})">삭제</button>
                `;
                container.appendChild(div);
            });
        }

        // 서비스 워커 등록 코드 (PWA 유지용)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker 등록 완료:', reg.scope))
                    .catch(err => console.log('Service Worker 등록 실패:', err));
            });
        }

        // 앱 시작
        initApp();
    </script>
</body>
</html>
